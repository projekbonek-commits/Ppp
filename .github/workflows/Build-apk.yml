name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare Web Assets
        run: |
          mkdir www
          
          # TRIK SULAP: Copy Market.html dan ubah namanya jadi index.html khusus buat di dalam APK
          cp Market.html www/index.html
          
          # Copy sisa file lainnya (kalau ada logo, gambar, dll)
          cp -r * www/ 2>/dev/null || true
          rm -rf www/www 2>/dev/null || true
          rm -rf www/.github 2>/dev/null || true

      - name: Install Capacitor & Android Tools
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init MarketEFootball com.efootball.market --web-dir www
          npx cap add android

      - name: Build Android Project
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: market-efootball-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
