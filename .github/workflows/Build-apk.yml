name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # TRIK BARU: Bikin folder 'www' otomatis dan masukin file HTML ke situ
      - name: Prepare Web Assets
        run: |
          mkdir www
          cp index.html www/
          cp manifest.json www/ 2>/dev/null || :
          cp icon.png www/ 2>/dev/null || :

      - name: Install Capacitor & Android Tools
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # web-dir sekarang diarahkan ke folder 'www'
          npx cap init MarketEFootball com.efootball.market --web-dir www
          npx cap add android

      - name: Build Android Project
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: market-efootball-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
